name: Refresh and publish data

on:
  schedule:
    # Hourly. This repo is public, so GitHub Actions minutes are free
    # regardless of cadence (https://docs.github.com/actions -- only
    # private repos meter minutes) -- cost was never the constraint here.
    # The constraint is that CMS/Census/NAIC don't publish sub-daily, so
    # anything tighter than hourly would just hammer their APIs for
    # identical data. Hourly is the useful ceiling: it's as fast as a
    # genuinely new Texas SERFF filing (data.texas.gov updates on its own
    # schedule through the day) or a manifest fix can land, without
    # polling a static source needlessly. Below hourly (e.g. every 5-15
    # min, cron's real floor) buys nothing for these sources and risks
    # GitHub silently deprioritizing an overly-chatty schedule under load.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: python3 scripts/build_manifest.py

      - name: Upload data as a build artifact (for debugging failed runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: published-data
          path: data/published/
          retention-days: 14

      - uses: actions/upload-pages-artifact@v3
        with:
          path: data/published/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
