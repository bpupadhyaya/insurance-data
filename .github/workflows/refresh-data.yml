name: Refresh and publish data

on:
  schedule:
    # Every Monday 09:00 UTC. Cadence matches how often the underlying
    # sources actually change (CMS/NAIC/etc. update far less than daily);
    # a tighter schedule would just burn free Actions minutes for no gain.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: python3 scripts/build_manifest.py

      - name: Upload data as a build artifact (for debugging failed runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: published-data
          path: data/published/
          retention-days: 14

      - uses: actions/upload-pages-artifact@v3
        with:
          path: data/published/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
